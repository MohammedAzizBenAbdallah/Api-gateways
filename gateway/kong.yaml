_format_version: "3.0"

services:
  # ==========================================
  # Service 2: Hello World (Local)
  # ==========================================
  - name: hello_world_service
    url: http://hello_world:8002
    routes:
      - name: hello_world_route
        paths:
          - /hello
    plugins:
      - name: rate-limiting
        config:
          second: 2
          hour: 100
          policy: local
      - name: tenant-restriction
        config: {} # No required_role needed

      - name: proxy-cache
        config:
          strategy: memory
          content_type:
            - "application/json"
          cache_ttl: 300
          response_code:
            - 200

      - name: jwt
        config:
          key_claim_name: iss
          claims_to_verify:
            - exp

      - name: simple-validator
        config:
          required_key: "secret"

  # ==========================================
  # Service 3: Demo Backend (Local)
  # ==========================================
  - name: demo_backend_service
    url: http://fastapi_backend:3000
    routes:
      - name: demo_backend_route
        paths:
          - /api
        strip_path: false
    plugins:
      - name: jwt
        config:
          key_claim_name: iss
          claims_to_verify:
            - exp
      - name: rate-limiting
        config:
          second: 2
          hour: 100
          policy: local
      - name: tenant-restriction
        config: {} # No required_role needed

  # = [MODIFY] ==========================
  # Service 4: Demo Frontend (Local)
  # ==========================================
  - name: demo_frontend_service
    url: http://frontend:5173
    routes:
      - name: demo_frontend_route
        paths:
          - /
        strip_path: false

  # ==========================================
  # Service 5: Ollama AI Service
  # ==========================================
  - name: ollama_service
    url: http://fastapi_backend:3000/api/ai/orchestrate/ollama_llama3.2
    routes:
      - name: ollama_chat_route
        paths:
          - /ai/chat
        strip_path: true
    plugins:
      - name: ai-proxy
        config:
          route_type: llm/v1/chat
          auth:
            allow_override: false
          model:
            provider: llama2
            name: DeepSeek-Coder:latest
            options:
              llama2_format: ollama
              upstream_url: http://host.docker.internal:11434/api/chat
      - name: pre-function
        config:
          access:
            - |
              local body = kong.request.get_raw_body()
              if body then
                local patterns = { "password", "exploit", "hack", "admin" }
                for _, p in ipairs(patterns) do
                  if string.find(string.lower(body), p) then
                    return kong.response.exit(400, { 
                      message = "Security block: Disallowed keyword '" .. p .. "' detected.",
                      plugin = "ai-dev-guard"
                    })
                  end
                end
              end
      - name: post-function
        config:
          header_filter:
            - |
              kong.response.set_header("X-AI-Debug", "DevGuard: Active, PII-Filter: Passive, Decorator: Applied")
              -- Note: Standard Kong latency headers are X-Kong-Proxy-Latency and X-Kong-Upstream-Latency
              -- These are usually provided by Kong core if enabled via env KONG_HEADERS=latency
      - name: rate-limiting
        config:
          second: 2
          hour: 100
          policy: local
      - name: tenant-restriction
        config: {} # No required_role needed

# ==========================================
# CONSUMERS
# ==========================================
consumers:
  - username: admin-user
    keyauth_credentials:
      - key: "{vault://hcv/secret/data/admin-security#password}"

# ==========================================
# GLOBAL PLUGINS
# ==========================================
plugins:
  - name: http-log
    config:
      http_endpoint: "http://kong-logger:9999/logs"
      method: "POST"
      content_type: "application/json"
