_format_version: "3.0"

services:
  - name: new
    url: http://197.14.4.163:8085/
    connect_timeout: 60000
    read_timeout: 60000
    write_timeout: 60000
    retries: 5
    routes:
      - name: newroute
        paths:
          - /new
        strip_path: true
        protocols:
          - http
          - https

  - name: fastapi
    url: http://fastapi_backend:3000/
    connect_timeout: 60000
    read_timeout: 60000
    write_timeout: 60000
    retries: 5
    routes:
      - name: fastapi
        paths:
          - /api
        strip_path: false
        protocols:
          - http

  - name: frontend
    url: http://frontend:5173/
    connect_timeout: 60000
    read_timeout: 60000
    write_timeout: 60000
    retries: 5
    routes:
      - name: demo_frontend_route
        paths:
          - /
        strip_path: false
        protocols:
          - http
          - https

plugins:
  - name: pre-function
    enabled: false
    config:
      access:
        - |
          if not _G.kong then return end
          if ngx.var.scheme == 'http' then ngx.redirect('https://' .. ngx.var.host .. ':8443' .. ngx.var.request_uri, 301) end
  - name: http-log
    enabled: true
    config:
      http_endpoint: "http://kong-logger:9999/logs"
      method: POST
      content_type: "application/json"
      keepalive: 60000
      timeout: 10000
      queue:
        concurrency_limit: 1
        max_batch_size: 1
        max_coalescing_delay: 1
        max_entries: 10000
        max_retry_time: 60
        initial_retry_delay: 0.01
        max_retry_delay: 60

