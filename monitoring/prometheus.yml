global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'fastapi_backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:3000']

  # In Kong hybrid mode the Admin API is on the control plane (private),
  # while data-plane prometheus metrics are exposed via the Status API on 8100.
  - job_name: 'kong'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['kong-dp:8100']

  - job_name: 'prometheus'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['prometheus:9090']
