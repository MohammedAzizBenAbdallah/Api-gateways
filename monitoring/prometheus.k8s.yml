global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'fastapi_backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['fastapi.ai-application.svc.cluster.local:3000']

  # Kong hybrid: prometheus metrics on the data-plane Status API (8100).
  - job_name: 'kong'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['kong-dp.ai-gateway.svc.cluster.local:8100']

  - job_name: 'prometheus'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['prometheus:9090']
