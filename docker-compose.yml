services:
  # --- Identity & Access Management ---
  keycloak-db:
    image: quay.io/sclorg/postgresql-15-c9s:latest
    container_name: keycloak-db
    environment:
      POSTGRESQL_DATABASE: keycloak
      POSTGRESQL_USER: keycloak
      POSTGRESQL_PASSWORD: password
      POSTGRESQL_ADMIN_PASSWORD: password
    volumes:
      - keycloak_data:/var/lib/pgsql/data

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      - keycloak-db
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    command: start-dev --import-realm

  # --- API Gateway ---
  apisix:
    image: apache/apisix:latest
    container_name: apisix-gateway
    volumes:
      - ./gateway/apisix_conf/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./gateway/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    ports:
      - "8000:9080"
      - "8001:9180" # Control API
    depends_on:
      - etcd
      - keycloak

  etcd:
    image: bitnamilegacy/etcd:3.5.0
    container_name: etcd
    environment:
      ETCD_ENABLE_V2: "true"
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"

  # --- Backend API ---
  backend:
    build: ./backend
    container_name: backend
    environment:
      PORT: 5000
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: newRealm
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - keycloak

  # --- Frontend Application ---
  frontend:
    build: ./frontend
    container_name: frontend
    command: npm run dev -- --host
    environment:
      VITE_KEYCLOAK_URL: http://localhost:8080
      VITE_KEYCLOAK_REALM: newRealm
      VITE_KEYCLOAK_CLIENT_ID: myclient
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - apisix

  # --- Helper Services ---
  hello_world:
    build: ./hello_world
    container_name: hello_world
    ports:
      - "8002:8002"
    volumes:
      - ./hello_world:/app
      - /app/node_modules
    depends_on:
      - keycloak

volumes:
  keycloak_data: {}
