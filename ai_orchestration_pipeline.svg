<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="#F8FAFC"/>
  
  <!-- Flow Line -->
  <path d="M50 200 H750" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="8 8"/>
  
  <!-- Pipeline Nodes -->
  <!-- 1. Auth -->
  <g transform="translate(50, 150)">
    <rect width="80" height="100" rx="8" fill="#4F46E5" fill-opacity="0.1" stroke="#4F46E5" stroke-width="2"/>
    <text x="40" y="45" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#4F46E5">1. AUTH</text>
    <text x="40" y="65" text-anchor="middle" font-family="Arial" font-size="8" fill="#1E293B">Keycloak</text>
    <text x="40" y="75" text-anchor="middle" font-family="Arial" font-size="8" fill="#1E293B">JWT/SSO</text>
  </g>

  <!-- 2. Threat Mitigation -->
  <g transform="translate(150, 150)">
    <rect width="80" height="100" rx="8" fill="#EF4444" fill-opacity="0.1" stroke="#EF4444" stroke-width="2"/>
    <text x="40" y="45" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#EF4444">2. THREAT</text>
    <text x="40" y="65" text-anchor="middle" font-family="Arial" font-size="8" fill="#1E293B">Injection</text>
    <text x="40" y="75" text-anchor="middle" font-family="Arial" font-size="8" fill="#1E293B">Blocking</text>
  </g>

  <!-- 3. Intent -->
  <g transform="translate(250, 150)">
    <rect width="80" height="100" rx="8" fill="#8B5CF6" fill-opacity="0.1" stroke="#8B5CF6" stroke-width="2"/>
    <text x="40" y="45" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#8B5CF6">3. INTENT</text>
    <text x="40" y="65" text-anchor="middle" font-family="Arial" font-size="8" fill="#1E293B">Classifier</text>
    <text x="40" y="75" text-anchor="middle" font-family="Arial" font-size="8" fill="#1E293B">Parsing</text>
  </g>

  <!-- 4. Policy -->
  <g transform="translate(350, 150)">
    <rect width="80" height="100" rx="8" fill="#F59E0B" fill-opacity="0.1" stroke="#F59E0B" stroke-width="2"/>
    <text x="40" y="45" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#F59E0B">4. POLICY</text>
    <text x="40" y="65" text-anchor="middle" font-family="Arial" font-size="8" fill="#1E293B">OPA Engine</text>
    <text x="40" y="75" text-anchor="middle" font-family="Arial" font-size="8" fill="#1E293B">Rego Rules</text>
  </g>

  <!-- 5. Routing -->
  <g transform="translate(450, 150)">
    <rect width="80" height="100" rx="8" fill="#06B6D4" fill-opacity="0.1" stroke="#06B6D4" stroke-width="2"/>
    <text x="40" y="45" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#06B6D4">5. ROUTE</text>
    <text x="40" y="65" text-anchor="middle" font-family="Arial" font-size="8" fill="#1E293B">Determ.</text>
    <text x="40" y="75" text-anchor="middle" font-family="Arial" font-size="8" fill="#1E293B">Mapping</text>
  </g>

  <!-- 6. AI Service -->
  <g transform="translate(560, 160)">
    <path d="M0 10 L80 10 L70 70 L10 70 Z" fill="#10B981" fill-opacity="0.2" stroke="#10B981" stroke-width="2"/>
    <text x="40" y="45" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#10B981">AI EXEC</text>
  </g>

  <!-- 7. Safety (PII) -->
  <g transform="translate(670, 150)">
    <rect width="80" height="100" rx="8" fill="#EC4899" fill-opacity="0.1" stroke="#EC4899" stroke-width="2"/>
    <text x="40" y="45" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#EC4899">7. SAFETY</text>
    <text x="40" y="65" text-anchor="middle" font-family="Arial" font-size="8" fill="#1E293B">PII Scrub</text>
    <text x="40" y="75" text-anchor="middle" font-family="Arial" font-size="8" fill="#1E293B">Redaction</text>
  </g>

  <!-- Observability (Bottom) -->
  <rect x="50" y="320" width="700" height="40" rx="8" fill="#64748B" fill-opacity="0.1" stroke="#64748B" stroke-width="1" stroke-dasharray="4"/>
  <text x="400" y="345" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#64748B">IMUTABLE AUDIT LOGGING &amp; REAL-TIME METRICS (Prometheus / Grafana)</text>

</svg>
