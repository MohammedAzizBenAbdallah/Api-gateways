apiVersion: batch/v1
kind: Job
metadata:
  name: kong-deck-sync
  namespace: ai-gateway
  labels:
    app: deck
    project: enterprise-ai-gateway
spec:
  ttlSecondsAfterFinished: 120 # Auto-delete job after 2 mins to allow re-runs
  template:
    spec:
      containers:
        - name: deck
          image: kong/deck@sha256:c9518f5fb96445ff349f6f91b038b15676bf871639f65173eb55ab54f1b329ba
          # Local workflow tradeoff: avoid registry pull flakiness in dev.
          # IfNotPresent favors local resiliency over automatic image freshness.
          imagePullPolicy: IfNotPresent
          command: ["deck", "gateway", "sync", "/gateway/kong_final.yaml"]
          env:
            - name: DECK_KONG_ADDR
              value: "http://kong-cp.ai-gateway.svc.cluster.local:8001"
          volumeMounts:
            - name: config-volume
              mountPath: /gateway
      restartPolicy: OnFailure
      volumes:
        - name: config-volume
          configMap:
            name: kong-deck-config
