apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi
  namespace: ai-application
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: fastapi
          imagePullPolicy: Always
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fastapi-hpa
  namespace: ai-application
spec:
  minReplicas: 2
  maxReplicas: 6
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong-dp
  namespace: ai-gateway
spec:
  replicas: 2
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kong-dp-hpa
  namespace: ai-gateway
spec:
  minReplicas: 2
  maxReplicas: 6
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ai-gateway
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: frontend
          imagePullPolicy: Always
