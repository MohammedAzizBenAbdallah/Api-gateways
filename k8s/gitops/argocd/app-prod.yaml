apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-gateway-prod
  namespace: argocd
  labels:
    environment: prod
    team: ai-platform
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: ai-platform-alerts
spec:
  project: ai-gateway
  source:
    repoURL: "https://github.com/MohammedAzizBenAbdallah/Api-gateways.git"
    targetRevision: main
    path: k8s/gitops/overlays/prod
    kustomize:
      buildOptions: --load-restrictor LoadRestrictionsNone
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-gateway
  syncPolicy:
    # Production: NO automated sync — requires manual approval via ArgoCD UI
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true
    retry:
      limit: 2
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
