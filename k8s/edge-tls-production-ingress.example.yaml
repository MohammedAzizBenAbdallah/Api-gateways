apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-gateway-edge
  namespace: ai-gateway
  annotations:
    # Example for cert-manager managed certs.
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - gateway.example.com
      secretName: ai-gateway-edge-tls
  rules:
    - host: gateway.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kong-dp
                port:
                  number: 80
