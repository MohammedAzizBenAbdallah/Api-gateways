# ─────────────────────────────────────────────────────────────────────────────
# postgres-kong.yaml  —  Layer 4: Kong Gateway Database
# Stores: Kong routes, services, plugins, consumers configuration
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kong-db-pvc
  namespace: ai-data
  labels:
    app: kong-db
    project: enterprise-ai-gateway
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-kong
  namespace: ai-data
  labels:
    app: kong-db
    project: enterprise-ai-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kong-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: kong-db
    spec:
      containers:
        - name: postgres
          image: postgres:13
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: kong-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kong-db-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: kong-db-secret
                  key: POSTGRES_DB
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "kong", "-d", "kong"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "kong", "-d", "kong"]
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kong-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-kong
  namespace: ai-data
  labels:
    app: kong-db
    project: enterprise-ai-gateway
spec:
  selector:
    app: kong-db
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
