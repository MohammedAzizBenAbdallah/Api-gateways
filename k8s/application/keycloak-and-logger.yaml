# ─────────────────────────────────────────────────────────────────────────────
# keycloak.yaml  —  Layer 3: Identity & Access Management
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: ai-application
  labels:
    app: keycloak
    project: enterprise-ai-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:latest
          args: ["start-dev", "--import-realm"]
          ports:
            - containerPort: 8080
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KC_DB_URL
            - name: KC_DB_USERNAME
              value: keycloak
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KC_DB_PASSWORD
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KEYCLOAK_ADMIN
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            - name: KC_HOSTNAME
              value: "http://localhost/auth"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          startupProbe:
            httpGet:
              path: /realms/master
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 75
            periodSeconds: 15
            timeoutSeconds: 5
          volumeMounts:
            - name: realm-config
              mountPath: /opt/keycloak/data/import
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: ai-application
  labels:
    app: keycloak
    project: enterprise-ai-gateway
spec:
  selector:
    app: keycloak
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
# ─────────────────────────────────────────────────────────────────────────────
# kong-logger.yaml  —  Layer 3: Kong Access Log Receiver
# Receives logs from Kong http-log plugin and writes to file + PostgreSQL
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong-logger
  namespace: ai-application
  labels:
    app: kong-logger
    project: enterprise-ai-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kong-logger
  template:
    metadata:
      labels:
        app: kong-logger
    spec:
      containers:
        - name: kong-logger
          image: api-gateways-kong-logger:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9999
          env:
            - name: PORT
              value: "9999"
            - name: LOGS_DIR
              value: "/app/logs"
            - name: BODY_LIMIT
              value: "256kb"
            - name: PLATFORM_DB_URL
              valueFrom:
                secretKeyRef:
                  name: platform-db-secret
                  key: DATABASE_URL
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 9999
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 9999
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kong-logger
  namespace: ai-application
  labels:
    app: kong-logger
    project: enterprise-ai-gateway
spec:
  selector:
    app: kong-logger
  ports:
    - port: 9999
      targetPort: 9999
  type: ClusterIP
