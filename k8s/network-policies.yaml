    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-application
          podSelector:
            matchLabels:
              app: intent-classifier
      ports:
        - port: 6379
---
# ── RULE 7: ai-application namespace — deny all, then allow selectively ──────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: ai-application
  labels:
    project: enterprise-ai-gateway
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
