---
# ── RULE 14: intent-classifier egress (single policy: Redis + DNS + HTTPS) ───
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intent-classifier-egress
  namespace: ai-application
  labels:
    project: enterprise-ai-gateway
spec:
  podSelector:
    matchLabels:
      app: intent-classifier
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-data
          podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
---
# ── RULE 15: Prometheus can scrape intent-classifier metrics ────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-to-intent-classifier
  namespace: ai-application
  labels:
    project: enterprise-ai-gateway
spec:
  podSelector:
    matchLabels:
      app: intent-classifier
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - port: 3010
