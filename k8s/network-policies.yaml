# ─────────────────────────────────────────────────────────────────────────────
# network-policies.yaml  —  Zero-Trust Network Security
#
# These policies implement the "blast radius containment" principle:
#   - If a pod in namespace A is compromised, it CANNOT reach pods in namespace B
#   - Every connection must be explicitly allowed — default is DENY ALL
#
# Think of these as Kubernetes-level firewalls between namespaces.
# ─────────────────────────────────────────────────────────────────────────────

# ── RULE 1: ai-data namespace — DENY ALL by default ──────────────────────────
# The database namespace rejects ALL traffic unless explicitly allowed below.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: ai-data
  labels:
    project: enterprise-ai-gateway
spec:
  podSelector: {}         # applies to ALL pods in this namespace
  policyTypes:
    - Ingress
    - Egress
---
# ── RULE 2: FastAPI can reach Platform DB ────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-fastapi-to-platform-db
  namespace: ai-data
  labels:
    project: enterprise-ai-gateway
spec:
  podSelector:
    matchLabels:
      app: platform-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-application
          podSelector:
            matchLabels:
              app: fastapi
      ports:
        - port: 5432
---
# ── RULE 3: kong-logger can reach Platform DB ────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kong-logger-to-platform-db
  namespace: ai-data
  labels:
    project: enterprise-ai-gateway
spec:
  podSelector:
    matchLabels:
      app: platform-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-application
          podSelector:
            matchLabels:
              app: kong-logger
      ports:
        - port: 5432
---
